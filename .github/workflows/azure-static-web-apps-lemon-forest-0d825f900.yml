name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # APIキーを GitHub Actions Secret から注入して appsettings.json を生成
      # Secret に以下を登録すること:
      #   AZURE_API_BASE_URL  : https://k-pos-system-api-func-xxxx.japanwest-01.azurewebsites.net/api
      #   AZURE_API_KEY       : <Function Key>
      - name: Generate appsettings.json from Secrets
        run: |
          cat > orderWebSystem/wwwroot/appsettings.json << EOF
          {
            "ApiBaseUrl": "${{ secrets.AZURE_API_BASE_URL }}",
            "ApiKey": "${{ secrets.AZURE_API_KEY }}"
          }
          EOF

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_FOREST_0D825F900 }}
          action: "upload"
          app_location: "orderWebSystem"
          api_location: ""
          output_location: "wwwroot"
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
